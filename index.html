<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Govinda AI</title>
    <!-- Tailwind CSS for sleek utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel to compile JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion for Animations -->
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            background: linear-gradient(180deg, #050b14 0%, #0a192f 100%);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-panel:hover {
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .neon-text {
            color: #38bdf8;
        }

        .metric-glow {
            border-left: 3px solid #38bdf8;
        }

        .metric-glow-danger {
            border-left: 3px solid #ef4444;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0B0E14;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #00FFCC;
            border-radius: 50%;
            margin-right: 4px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Backend URL (FastAPI)
        const API_URL = "http://localhost:8000";

        // ==========================================
        // UI COMPONENTS
        // ==========================================

        const Card = ({ children, className = "" }) => (
            <div className={`glass-panel p-6 ${className}`}>
                {children}
            </div>
        );

        const Metric = ({ title, value, subtext, isDanger = false }) => (
            <div className={`glass-panel p-4 ${isDanger ? 'metric-glow-danger' : 'metric-glow'}`}>
                <p className="text-gray-400 text-sm uppercase tracking-wider mb-1">{title}</p>
                <h3 className={`text-2xl font-bold ${isDanger ? 'text-red-400' : 'text-white'}`}>{value}</h3>
                {subtext && <p className="text-xs text-gray-500 mt-2">{subtext}</p>}
            </div>
        );

        const Badge = ({ level }) => {
            const colors = {
                "LOW": "bg-green-500/20 text-green-400 border-green-500",
                "MEDIUM": "bg-yellow-500/20 text-yellow-400 border-yellow-500",
                "HIGH": "bg-orange-500/20 text-orange-400 border-orange-500",
                "CRITICAL": "bg-red-500/20 text-red-400 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]"
            };
            const col = colors[level] || colors["LOW"];
            return (
                <span className={`px-3 py-1 text-xs font-bold rounded-full border ${col} uppercase`}>
                    {level}
                </span>
            );
        };

        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.setAttribute('class', className);
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(i);
                    if (window.lucide) {
                        window.lucide.createIcons({ root: spanRef.current });
                    }
                }
            }, [name, className]);
            return <span ref={spanRef} dangerouslySetInnerHTML={{ __html: '' }} className="inline-flex content-center items-center" />;
        };

        // ==========================================
        // MAIN APP
        // ==========================================

        const App = () => {
            const [mode, setMode] = useState("landing"); // 'landing', 'live', 'batch', 'challenge', 'why'
            const [strictMode, setStrictMode] = useState(false);
            const [selectedSolution, setSelectedSolution] = useState("fraud"); // 'fraud', 'entity', 'compliance'

            // Live Simulation State
            const [transactions, setTransactions] = useState([]);
            const [isScanning, setIsScanning] = useState(true);
            const [selectedTxn, setSelectedTxn] = useState(null);

            // Batch State
            const [batchResults, setBatchResults] = useState(null);
            const [isUploading, setIsUploading] = useState(false);

            // Auto-Enable Strict Mode Logic
            useEffect(() => {
                if (mode === "live" && !strictMode && transactions.length > 0) {
                    // Check the last 4 transactions. If 2 or more are HIGH/CRITICAL, auto-trigger strict mode!
                    const recentFlags = transactions.slice(0, 4).filter(t => ['HIGH', 'CRITICAL'].includes(t.risk_level)).length;
                    if (recentFlags >= 2) {
                        setStrictMode(true);
                    }
                }
            }, [transactions, mode, strictMode]);

            // Simulation Effect
            useEffect(() => {
                if (mode !== "live") return;

                const fetchRandomTxn = async () => {
                    setIsScanning(true);
                    try {
                        // In reality, this would hit a websocket or random generator endpoint.
                        // For the hackathon demo, we will ping FastAPI to generate or fetch a row
                        const res = await fetch(`${API_URL}/api/simulate?strict=${strictMode}`);
                        const data = await res.json();

                        setTransactions(prev => [data, ...prev].slice(0, 15)); // Keep last 15

                        // If it's a fraud transaction, auto-select it to show Gemini report
                        if (data.risk_level === "CRITICAL" || data.risk_level === "HIGH") {
                            setSelectedTxn(data);
                        }
                    } catch (e) {
                        console.error("Simulation error", e);
                    }
                    setIsScanning(false);
                };

                const interval = setInterval(() => {
                    if (Math.random() > 0.3) { // 70% chance to fetch a txn every tick
                        fetchRandomTxn();
                    }
                }, 3000); // Check every 3 seconds

                return () => clearInterval(interval);
            }, [mode, strictMode]);

            return (
                <div className="flex h-screen w-full bg-[#030914]">
                    {/* Darker, flatter BG to emulate enterprise dashboard */}

                    {/* SIDEBAR */}
                    <div className="w-64 bg-[#0a192f] border-r border-[#1e2d4a] flex flex-col p-6 z-10 shadow-xl">
                        <div className="flex items-center gap-3 mb-10 pb-6 border-b border-[#1e2d4a]">
                            <Icon name="shield-check" className="text-white w-8 h-8 p-1.5 rounded bg-gradient-to-br from-purple-600 to-blue-500" />
                            <div>
                                <h1 className="text-xl font-bold tracking-tight text-white">
                                    Govinda<span className="text-blue-400">.ai</span>
                                </h1>
                                <p className="text-[10px] text-slate-400 uppercase font-semibold tracking-widest mt-0.5">Risk Intelligence</p>
                            </div>
                        </div>

                        <div className="space-y-2 mb-8">
                            <p className="text-[11px] text-slate-500 uppercase tracking-widest mb-3 font-semibold">Solutions</p>

                            <button
                                onClick={() => setMode("landing")}
                                className={`w-full text-left px-4 py-2.5 rounded-md flex items-center gap-3 transition-colors ${mode === 'landing' ? 'bg-[#112240] text-blue-400 border-l-2 border-blue-500 shadow-sm' : 'text-slate-400 hover:bg-[#112240] hover:text-slate-200'}`}
                            >
                                <Icon name="layout-dashboard" className="w-4 h-4" />
                                <span className="font-medium text-sm">Platform Overview</span>
                            </button>

                            <button
                                onClick={() => setMode("live")}
                                className={`w-full text-left px-4 py-2.5 rounded-md flex items-center gap-3 transition-colors ${mode === 'live' ? 'bg-[#112240] text-blue-400 border-l-2 border-blue-500 shadow-sm' : 'text-slate-400 hover:bg-[#112240] hover:text-slate-200'}`}
                            >
                                <Icon name="activity" className="w-4 h-4" />
                                <span className="font-medium text-sm">Live Network</span>
                            </button>

                            <button
                                onClick={() => setMode("batch")}
                                className={`w-full text-left px-4 py-2.5 rounded-md flex items-center gap-3 transition-colors ${mode === 'batch' ? 'bg-[#112240] text-blue-400 border-l-2 border-blue-500 shadow-sm' : 'text-slate-400 hover:bg-[#112240] hover:text-slate-200'}`}
                            >
                                <Icon name="database" className="w-4 h-4" />
                                <span className="font-medium text-sm">Batch Analysis</span>
                            </button>
                        </div>

                        <div className="mt-auto">
                            <div className="glass-panel p-4 bg-slate-800/50">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                                        <Icon name="zap" className="w-4 h-4 text-yellow-400" />
                                        Strict Mode
                                    </span>
                                    <button
                                        onClick={() => setStrictMode(!strictMode)}
                                        className={`w-10 h-5 rounded-full relative transition-colors ${strictMode ? 'bg-red-500' : 'bg-slate-600'}`}
                                    >
                                        <div className={`w-3 h-3 bg-white rounded-full absolute top-1 transition-transform ${strictMode ? 'translate-x-6' : 'translate-x-1'}`}></div>
                                    </button>
                                </div>
                                <p className="text-xs text-slate-500">Enable during network threats to boost anomaly detection sensitivity.</p>
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT DIV */}
                    <div className="flex-1 flex flex-col bg-[#030914] overflow-y-auto">

                        {mode === "landing" ? (
                            <LandingView setMode={setMode} setSelectedSolution={setSelectedSolution} />
                        ) : mode === "challenge" ? (
                            <ChallengeView setMode={setMode} solution={selectedSolution} />
                        ) : mode === "why" ? (
                            <WhyView setMode={setMode} />
                        ) : (
                            <div className="p-8 flex-1 flex flex-col">
                                <header className="mb-8 pb-6 border-b border-[#1e2d4a] flex justify-between items-start">
                                    <div className="max-w-xl">
                                        <div className="inline-flex items-center gap-2 px-2.5 py-1 rounded bg-[#112240] border border-blue-500/30 text-blue-400 text-[10px] font-bold tracking-wider mb-3 uppercase">
                                            <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                                            Ensemble Pipeline Status: Operational
                                        </div>
                                        <h1 className="text-2xl font-bold text-slate-100 mb-2 tracking-tight">Enterprise Fraud Intelligence Base</h1>
                                        <p className="text-slate-400 text-sm font-normal">Real-time deep learning anomaly isolation and automated threat reporting.</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <Metric title="Active Matrix" value="4 Models" subtext="Fusion Mode Enabled" />
                                        <Metric title="Security Posture" value={strictMode ? 'ELEVATED' : 'NORMAL'} isDanger={strictMode} />
                                    </div>
                                </header>

                                {mode === "live" ? (
                                    <LiveView
                                        transactions={transactions}
                                        isScanning={isScanning}
                                        selectedTxn={selectedTxn}
                                        setSelectedTxn={setSelectedTxn}
                                    />
                                ) : (
                                    <BatchView
                                        strictMode={strictMode}
                                        batchResults={batchResults}
                                        setBatchResults={setBatchResults}
                                        isUploading={isUploading}
                                        setIsUploading={setIsUploading}
                                    />
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // SUB-VIEWS
        // ==========================================

        const WhyView = ({ setMode }) => {
            return (
                <div className="flex flex-col w-full bg-[#030914] min-h-screen text-slate-100 relative py-16 px-6 lg:px-12 items-center">
                    <div className="w-full max-w-6xl mb-8 flex justify-start">
                        <button onClick={() => setMode('landing')} className="text-slate-400 hover:text-white flex items-center gap-2 text-sm font-medium transition-colors">
                            <Icon name="arrow-left" className="w-4 h-4" /> Back to Home
                        </button>
                    </div>

                    {/* Top Heading */}
                    <div className="max-w-4xl text-center mb-10">
                        <h1 className="text-4xl md:text-5xl lg:text-5xl font-bold mb-6 text-white tracking-tight leading-tight">
                            Smarter Risk Management<br />Powered by AI
                        </h1>
                        <p className="text-lg text-slate-400 mb-10">
                            Stay ahead of fraud and risk with solutions that adapt to your business. Using cutting-edge AI and machine learning, you get real-time risk intelligence tailored to meet your unique challenges.
                        </p>
                    </div>

                    {/* Features and Graphic Layout */}
                    <div className="w-full max-w-6xl mt-16 flex flex-col lg:flex-row items-center gap-16 lg:gap-8 justify-between">

                        {/* Left Side: Cards */}
                        <div className="flex flex-col gap-6 w-full lg:w-[45%]">
                            <div className="bg-[#0a192f] border border-[#1e2d4a] rounded-xl p-6 shadow-sm flex flex-col gap-2 hover:border-blue-500/50 transition-colors">
                                <div className="flex items-center gap-3">
                                    <Icon name="shield-check" className="w-6 h-6 text-[#1f75ff]" />
                                    <h3 className="text-lg font-bold text-slate-100">Precision Risk Scoring</h3>
                                </div>
                                <p className="text-slate-400 text-sm pl-9">Quantify threats in real-time for clarity in every decision.</p>
                            </div>

                            <div className="bg-[#0a192f] border border-[#1e2d4a] rounded-xl p-6 shadow-sm flex flex-col gap-2 hover:border-blue-500/50 transition-colors">
                                <div className="flex items-center gap-3">
                                    <Icon name="cpu" className="w-6 h-6 text-[#1f75ff]" />
                                    <h3 className="text-lg font-bold text-slate-100">Custom Machine Learning Models</h3>
                                </div>
                                <p className="text-slate-400 text-sm pl-9">Tailored to your industry and specific risk factors.</p>
                            </div>

                            <div className="bg-[#0a192f] border border-[#1e2d4a] rounded-xl p-6 shadow-sm flex flex-col gap-2 hover:border-blue-500/50 transition-colors">
                                <div className="flex items-center gap-3">
                                    <Icon name="search" className="w-6 h-6 text-[#1f75ff]" />
                                    <h3 className="text-lg font-bold text-slate-100">Transparent & Explainable AI</h3>
                                </div>
                                <p className="text-slate-400 text-sm pl-9">Trust decisions supported by explainable, actionable results.</p>
                            </div>
                        </div>

                        {/* Right Side: 3D Mock Graphic */}
                        <div className="w-full lg:w-[50%] flex justify-center items-center relative h-96">
                            {/* Abstract Dots/Cubes graphic mock */}
                            <div className="relative w-full h-full flex items-center justify-center pointer-events-none">
                                {/* The large blue ring */}
                                <div className="absolute left-[10%] w-64 h-64 border-[16px] border-y-[#1f75ff] border-x-[#0ea5e9] rounded-full shadow-[0_0_30px_rgba(59,130,246,0.3)] transform rotate-12 skew-x-12 z-20 flex items-center justify-center bg-[#0a192f]/50 backdrop-blur-sm">
                                    <div className="w-48 h-48 border-[8px] border-[#1e2d4a] rounded-full shadow-[inset_0_0_20px_rgba(0,0,0,0.3)]"></div>
                                </div>

                                {/* 3D Cube cluster mock */}
                                <div className="absolute right-[10%] z-10 scale-125 transform -rotate-12 translate-y-8 flex flex-col">
                                    <div className="grid grid-cols-2 gap-2 transform translate-x-4 mb-2">
                                        <div className="w-16 h-16 bg-pink-900/40 border border-pink-500/50 grid grid-cols-4 gap-1 p-1 transform skew-y-12 rotate-[-15deg] shadow-[0_0_15px_rgba(236,72,153,0.2)]">
                                            {[...Array(16)].map((_, i) => <div key={i} className="bg-pink-400 rounded-full w-2 h-2"></div>)}
                                        </div>
                                        <div className="w-16 h-16 bg-pink-900/40 border border-pink-500/50 grid grid-cols-4 gap-1 p-1 transform skew-y-[-12deg] rotate-[15deg] shadow-[0_0_15px_rgba(236,72,153,0.2)] translate-y-2">
                                            {[...Array(16)].map((_, i) => <div key={i} className="bg-pink-400 rounded-full w-2 h-2"></div>)}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 relative z-20">
                                        <div className="w-20 h-20 bg-blue-900/40 border border-blue-500/50 grid grid-cols-5 gap-0.5 p-1 transform skew-y-[-10deg] shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                                            {[...Array(25)].map((_, i) => <div key={i} className="bg-blue-500 rounded-full w-2 h-2"></div>)}
                                        </div>
                                        <div className="w-20 h-20 bg-cyan-900/40 border border-cyan-400/50 grid grid-cols-5 gap-0.5 p-1 transform skew-y-[10deg] translate-y-[-10px] shadow-[0_0_20px_rgba(34,211,238,0.2)]">
                                            {[...Array(25)].map((_, i) => <div key={i} className="bg-cyan-400 rounded-[1px] w-2 h-2 transform rotate-45"></div>)}
                                        </div>
                                    </div>
                                </div>
                                {/* Trailing scattered dots */}
                                <div className="absolute bottom-10 left-0 flex gap-2 rotate-[-20deg]">
                                    <div className="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                                    <div className="w-2 h-2 bg-pink-400 rounded-full transform translate-y-1"></div>
                                    <div className="w-1.5 h-1.5 bg-cyan-400 rounded-full transform translate-y-[-2px]"></div>
                                    <div className="w-2 h-2 bg-blue-500 rounded-full transform translate-y-2"></div>
                                    <div className="w-1.5 h-1.5 bg-pink-400 rounded-full transform translate-y-[-4px]"></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const ChallengeView = ({ setMode, solution }) => {

            const content = {
                fraud: {
                    title: <>Fraud is Constantly Changing.<br />Your Defense Should Too.</>,
                    desc: "Digital payments are transforming global financial systems, and their rapid growth brings significant challenges that require innovative solutions.",
                    mainCard: { icon: "user-check", text: "Isolate fraud, improve user experience, grow sales" },
                    cards: [
                        { icon: "list-checks", color: "text-pink-500", text: "Retake control of your review queues" },
                        { icon: "zap", color: "text-purple-400", text: "Make 99.9% accurate decisions in 200ms" },
                        { icon: "shield", color: "text-slate-300", text: "Contain both known and emerging threats" },
                        { icon: "piggy-bank", color: "text-blue-500", text: "Protect every payment method and channel" }
                    ]
                },
                entity: {
                    title: <>Risk Isn't Always Visible,<br />but It's Always There</>,
                    desc: "Risk isn't limited to individual transactions—it's rooted in the transacting parties ('entities') behind them. Without a complete view of these connections, it becomes increasingly difficult to combat financial crime.",
                    mainCard: { icon: "layers", text: "Strengthen risk insights across the customer journey" },
                    cards: [
                        { icon: "alert-triangle", color: "text-yellow-400", text: "Optimize alerts to only action on high-risk threats" },
                        { icon: "refresh-cw", color: "text-pink-500", text: "Get a continuous and complete lifecycle view" },
                        { icon: "crosshair", color: "text-cyan-400", text: "Safeguard your revenues and reputation" },
                        { icon: "trending-down", color: "text-blue-500", text: "Reduce operational and IT costs permanently" }
                    ]
                }
            };

            const data = content[solution] || content.fraud;

            return (
                <div className="flex flex-col gap-16 py-12 px-6 lg:px-12 max-w-7xl mx-auto w-full">
                    <div className="mb-4">
                        <button onClick={() => setMode('landing')} className="text-slate-400 hover:text-white flex items-center gap-2 text-sm font-medium transition-colors">
                            <Icon name="arrow-left" className="w-4 h-4" /> Back to Platform Overview
                        </button>
                    </div>
                    <div className="flex flex-col items-center">
                        <div className="flex items-center gap-2 mb-6">
                            <div className="flex -space-x-1">
                                <div className="w-3 h-3 bg-blue-500 rounded-sm"></div>
                                <div className="w-3 h-3 bg-cyan-400 rounded-sm mt-2"></div>
                            </div>
                            <span className="text-slate-300 font-semibold tracking-wide text-sm uppercase">{solution === 'entity' ? 'Entity Risk' : 'The Challenge'}</span>
                        </div>
                        <h2 className="text-4xl md:text-5xl font-extrabold text-white mb-6 text-center leading-tight">
                            {data.title}
                        </h2>
                        <p className="text-slate-400 max-w-3xl text-center text-lg mb-16">
                            {data.desc}
                        </p>

                        <div className="relative w-full max-w-4xl mx-auto flex flex-col items-center">
                            <div className="absolute top-10 bottom-10 left-1/2 -translate-x-1/2 w-0.5 border-l-2 border-dashed border-cyan-400/60 z-0 hidden md:block"></div>

                            <div className="bg-[#0a192f] border border-[#1e2d4a] rounded-xl px-8 py-5 flex items-center gap-4 shadow-lg z-10 w-full max-w-lg mb-10 hover:border-blue-500/50 transition-colors">
                                <Icon name={data.mainCard.icon} className="w-6 h-6 text-pink-500 flex-shrink-0" />
                                <span className="text-slate-200 font-medium text-sm">{data.mainCard.text}</span>
                            </div>

                            <div className="w-full flex flex-col md:flex-row justify-between items-center gap-8 md:gap-0 mb-10 relative">
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center gap-2 z-10 hidden md:flex">
                                    <div className="w-3 h-3 bg-blue-500 rounded-full"></div>
                                    <div className="w-6 h-0.5 border-t-2 border-dashed border-blue-500"></div>
                                    <div className="w-3 h-3 bg-cyan-400 rounded-full"></div>
                                </div>
                                <div className="bg-[#0a192f] border border-[#1e2d4a] rounded-xl px-8 py-5 flex items-center gap-4 shadow-lg z-10 w-full md:w-[45%] hover:border-cyan-400/50 transition-colors">
                                    <Icon name={data.cards[0].icon} className={`w-6 h-6 ${data.cards[0].color} flex-shrink-0`} />
                                    <span className="text-slate-200 font-medium text-sm">{data.cards[0].text}</span>
                                </div>

                                        <p className="text-3xl font-bold text-white">{selectedTxn.score?.toFixed(1)}%</p>
                                    </div>
                                    <div className={`bg-[#0a192f] border rounded shadow-sm p-5 ${['CRITICAL', 'HIGH'].includes(selectedTxn.risk_level) ? 'border-red-900/80 shadow-[0_0_15px_rgba(239,68,68,0.15)] bg-red-950/10' : 'border-emerald-900/80 bg-emerald-950/10'}`}>
                                        <p className="text-slate-400 text-[11px] uppercase tracking-widest font-semibold mb-2">Final Verdict</p>
                                        <Badge level={selectedTxn.risk_level} />
                                    </div>
                                </div>

                                {['CRITICAL', 'HIGH'].includes(selectedTxn.risk_level) && (
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-[#050b14] border border-[#1e2d4a] rounded shadow-sm p-4">
                                            <p className="text-slate-500 text-[10px] tracking-widest uppercase mb-1.5 font-bold flex items-center gap-2"><Icon name="shopping-bag" className="w-3.5 h-3.5" /> Merchant Context</p>
                                            <p className="text-sm text-slate-300 font-mono tracking-tight">{selectedTxn.merchant || "N/A"}</p>
                                        </div>
                                        <div className="bg-[#050b14] border border-[#1e2d4a] rounded shadow-sm p-4">
                                            <p className="text-slate-500 text-[10px] tracking-widest uppercase mb-1.5 font-bold flex items-center gap-2"><Icon name="globe" className="w-3.5 h-3.5" /> Network Origin (IP)</p>
                                            <p className="text-sm text-slate-300 font-mono tracking-tight">{selectedTxn.ip_address || "N/A"}</p>
                                        </div>
                                    </div>
                                )}

                                {['CRITICAL', 'HIGH'].includes(selectedTxn.risk_level) ? (
                                    <div className="flex-1 bg-[#0a192f] border border-red-900/50 rounded shadow-md overflow-y-auto p-6 relative">

                                        <div className="flex items-center gap-4 mb-6 border-b border-[#1e2d4a] pb-5">
                                            <div className="w-10 h-10 rounded bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center shadow-lg shadow-purple-500/20 p-0.5">
                                                <div className="w-full h-full bg-[#0a192f] rounded-[3px] flex items-center justify-center">
                                                    <Icon name="cpu" className="text-blue-400 w-5 h-5" />
                                                </div>
                                            </div>
                                            <div>
                                                <h3 className="text-lg font-bold text-white tracking-tight">AI Compliance Agent</h3>
                                                <p className="text-[11px] text-slate-400 font-semibold uppercase tracking-widest mt-0.5">Autonomous Threat Verification & SAR Drafter</p>
                                            </div>
                                        </div>

                                        {!selectedTxn.ai_report ? (
                                            <div className="p-8 text-center bg-slate-800/50 rounded-lg flex flex-col items-center border border-slate-700">
                                                <div className="typing-indicator mt-4 mb-4"><span></span><span></span><span></span></div>
                                                <p className="text-slate-400">Gemini AI is analyzing the anomaly signatures...</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div>
                                                    <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                                        <Icon name="search" className="w-4 h-4 text-blue-400" /> Deep Dive Analysis
                                                    </h4>
                                                    <div className="bg-[#050b14] border border-[#1e2d4a] rounded shadow-inner p-5 text-slate-300 text-sm leading-relaxed font-mono">
                                                        {selectedTxn.ai_report.split('\n').map((line, i) => (
                                                            <p key={i} className="mb-2">{line}</p>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                                            <Icon name="file-text" className="w-4 h-4 text-emerald-400" /> Auto-Drafted SAR
                                                        </h4>
                                                        <div className="bg-[#050b14] border border-[#1e2d4a] rounded shadow-inner p-4 text-xs text-slate-400 font-mono h-48 overflow-y-auto">
                                                            {selectedTxn.sar_draft || "Generating SAR..."}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                                            <Icon name="mail-warning" className="w-4 h-4 text-orange-400" /> Customer Outreach
                                                        </h4>
                                                        <div className="bg-[#050b14] border border-[#1e2d4a] rounded shadow-inner p-4 text-xs text-slate-400 font-mono h-48 overflow-y-auto">
                                                            {selectedTxn.customer_msg || "Generating draft..."}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="flex-1 bg-[#0a192f] border border-[#1e2d4a] rounded shadow-sm flex items-center justify-center flex-col">
                                        <Icon name="shield-check" className="w-16 h-16 text-emerald-500 mb-4" />
                                        <h3 className="text-xl font-bold text-white mb-2">No Anomalies Detected</h3>
                                        <p className="text-slate-400 text-sm text-center max-w-md">Transaction signature verified by Ensemble Isolation Forest.</p>
                                    </div>
                                )}
                            </motion.div>
                        ) : (
                            <div className="h-full flex items-center justify-center border-dashed border-2 border-[#1e2d4a] bg-[#050b14] rounded">
                                <div className="text-center">
                                    <Icon name="mouse-pointer-click" className="w-10 h-10 text-slate-600 mx-auto mb-4" />
                                    <p className="text-slate-500 text-sm font-medium">Select a transaction packet to initiate deep analysis.</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div >
            );
        };

        const BatchView = ({ strictMode, batchResults, setBatchResults, isUploading, setIsUploading }) => {

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsUploading(true);
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await fetch(`${API_URL}/api/analyze/batch?strict_mode=${strictMode}`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await res.json();
                    setBatchResults(data);
                } catch (error) {
                    console.error("Error uploading batch file:", error);
                    alert("Failed to analyze CSV. Ensure backend is running.");
                } finally {
                    setIsUploading(false);
                }
            };

            if (isUploading) {
                return (
                    <div key="loading" className="bg-[#0a192f] border border-[#1e2d4a] rounded p-12 text-center h-[600px] flex flex-col items-center justify-center border-dashed border-2">
                        <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-6"></div>
                        <h2 className="text-2xl font-bold text-white mb-2">Analyzing Threat Vectors</h2>
                        <p className="text-slate-400">Running dataset through PyTorch Autoencoders and XGBoost Ensemble...</p>
                    </div>
                );
            }

            if (batchResults) {
                const { total_analyzed, total_flagged, highest_risk_analysis, results } = batchResults;
                return (
                    <motion.div key="results" initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex flex-col gap-6">
                        <div className="grid grid-cols-3 gap-6">
                            <Metric title="Total Scanned" value={total_analyzed} subtext="Transactions in Dataset" />
                            <Metric title="Safe Network Traffic" value={total_analyzed - total_flagged} />
                            <Metric title="Flagged Anomalies" value={total_flagged} isDanger={total_flagged > 0} />
                        </div>

                        {total_flagged > 0 && (
                            <div className="flex flex-col gap-6">
                                {results.filter(r => ['HIGH', 'CRITICAL'].includes(r.risk_level)).map((txn) => (
                                    <div key={txn.id} className="bg-[#0a192f] border border-red-900/50 rounded shadow-md p-6">
                                        <div className="flex justify-between items-start mb-4">
                                            <h3 className="text-xl font-bold text-red-400 flex items-center gap-2">
                                                <Icon name="alert-triangle" className="w-5 h-5" />
                                                Threat Profile ID-{txn.id}
                                            </h3>
                                            <span className="text-slate-500 font-mono text-xs font-bold bg-[#050b14] px-2 py-1 rounded border border-[#1e2d4a]">Time Stamp: {txn.time.toFixed(1)}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-500 mb-1 tracking-widest uppercase">Target Amount</p>
                                                <p className="text-2xl font-mono text-white mb-4">${txn.amount.toFixed(2)}</p>

                                                <p className="text-[10px] font-bold text-slate-500 mb-1 tracking-widest uppercase">Confidence Score</p>
                                                <p className="text-2xl font-mono text-red-400 mb-4">{txn.score.toFixed(1)}%</p>

                                                <div className="grid grid-cols-2 gap-2 mb-4">
                                                    <div className="bg-[#050b14] p-2.5 rounded border border-[#1e2d4a]">
                                                        <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Merchant</p>
                                                        <p className="text-xs text-slate-300 truncate font-mono">{txn.merchant}</p>
                                                    </div>
                                                    <div className="bg-[#050b14] p-2.5 rounded border border-[#1e2d4a]">
                                                        <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Source IP</p>
                                                        <p className="text-xs text-slate-300 truncate font-mono">{txn.ip_address}</p>
                                                    </div>
                                                </div>

                                                <Badge level={txn.risk_level} />
                                            </div>
                                            <div className="bg-[#050b14] p-5 rounded font-mono text-xs text-slate-300 border border-[#1e2d4a] h-48 overflow-y-auto shadow-inner">
                                                <p className="text-blue-400 mb-3 font-bold uppercase tracking-wider">&gt;&gt; Agent Intelligence Report</p>
                                                {(txn.ai_report || "AI Analysis unavailable or generating...").split('\n').map((line, i) => (
                                                    <p key={i} className="mb-2 leading-relaxed">{line}</p>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="mt-4 flex justify-end">
                            <button
                                onClick={() => setBatchResults(null)}
                                className="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition-colors border border-slate-600"
                            >
                                Clear Results & Upload New
                            </button>
                        </div>
                    </motion.div>
                );
            }

            return (
                <div key="upload" className="bg-[#0a192f] p-12 text-center h-[600px] flex flex-col items-center justify-center border-dashed border-2 border-[#1e2d4a] rounded shadow-sm">
                    <Icon name="database" className="w-16 h-16 text-slate-600 mb-6" />
                    <h2 className="text-2xl font-bold text-white mb-2 tracking-tight">Batch CSV Upload</h2>
                    <p className="text-slate-400 mb-8 max-w-md text-sm">Drag and drop a CSV payload containing offline transactions to process them against the ensemble AI pipeline.</p>

                    <label className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded cursor-pointer transition-colors shadow-md">
                        Browse Files
                        <input type="file" className="hidden" accept=".csv" onChange={handleFileUpload} />
                    </label>
                </div>
            );
        };

        // Render React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
